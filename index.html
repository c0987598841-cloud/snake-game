<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典貪食蛇 - 豪華特效最終版</title>
    <style>
        :root {
            --bg-color: #F5F5DC;    /* 米白底 */
            --deep-green: #006400;  /* 深綠 */
            --light-green: #2E8B57; /* 淺綠 */
            --canvas-bg: #FFFDE7;   /* 畫布底 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--deep-green);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 標題：置中並往左位移 4 個字元 (原 -2em，再往左 2 個即為 -4em) */
        h1 {
            text-align: center;
            margin: 0 0 20px -4em; 
            letter-spacing: 10px;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #main-layout {
            display: flex;
            align-items: flex-start;
            gap: 40px;
        }

        /* 遊戲畫布容器 */
        #game-container {
            position: relative;
            border: 10px solid var(--deep-green);
            background-color: var(--canvas-bg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }

        /* 遊戲結束時的方框震動動畫 */
        @keyframes shake-anim {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-8px, 5px); }
            40% { transform: translate(8px, -5px); }
            60% { transform: translate(-8px, -5px); }
            80% { transform: translate(8px, 5px); }
            100% { transform: translate(0, 0); }
        }
        .shake { animation: shake-anim 0.3s ease-in-out; }

        canvas { display: block; }

        /* 右側控制面板 */
        #side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 140px;
        }

        /* 漸層立體方塊按鈕與分數框 */
        .glass-block {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            background: linear-gradient(145deg, var(--light-green), var(--deep-green));
            box-shadow: 0 8px 0 #004200, 0 15px 20px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .glass-block:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #004200, 0 8px 10px rgba(0,0,0,0.2);
        }

        .glass-block.active { outline: 4px solid #FFD700; filter: brightness(1.2); }

        #score-block {
            cursor: default;
            background: linear-gradient(145deg, #444, #222);
            box-shadow: 0 8px 0 #111, 0 15px 20px rgba(0,0,0,0.3);
        }

        .block-label { font-size: 14px; opacity: 0.8; margin-bottom: 5px; }
        .block-value { font-size: 32px; }

        /* 右側方向鍵提示 UI */
        .key-viz {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .key-row { display: flex; gap: 5px; }
        .v-key {
            width: 35px; height: 35px; border: 2px solid var(--deep-green);
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            background: white; font-size: 14px; transition: 0.1s;
        }
        .v-key.active-press { background: var(--deep-green); color: white; transform: scale(0.9); }

        /* 遊戲覆蓋層 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(245, 245, 220, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .space-hint {
            margin-top: 20px; font-weight: bold; color: #555;
            animation: blink 1.2s infinite;
        }
        @keyframes blink { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <h1>經典貪食蛇</h1>

    <div id="main-layout">
        <div id="game-container">
            <canvas id="snakeCanvas" width="600" height="600"></canvas>
            <div id="overlay">
                <div id="status-title" style="font-size: 48px; font-weight: bold;">準備好了嗎？</div>
                <div id="final-score" style="font-size: 24px; margin: 10px 0; display: none;"></div>
                <div class="space-hint">按 [ 空白鍵 ] 開始 / 結束代打</div>
            </div>
        </div>

        <div id="side-panel">
            <button class="glass-block" id="btn-manual" onclick="changeMode('manual')">
                <span style="font-size: 24px;">👤</span>
                <div class="block-label">手動模式</div>
            </button>
            <button class="glass-block" id="btn-bot" onclick="changeMode('bot')">
                <span style="font-size: 24px;">🤖</span>
                <div class="block-label">自動代打</div>
            </button>
            <div class="glass-block" id="score-block">
                <div class="block-label">目前分數</div>
                <div id="score-val" class="block-value">0</div>
            </div>
            <div class="key-viz">
                <div class="v-key" id="vkey-ArrowUp">↑</div>
                <div class="key-row">
                    <div class="v-key" id="vkey-ArrowLeft">←</div>
                    <div class="v-key" id="vkey-ArrowDown">↓</div>
                    <div class="v-key" id="vkey-ArrowRight">→</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeCanvas");
        const ctx = canvas.getContext("2d");
        const scoreVal = document.getElementById("score-val");
        const overlay = document.getElementById("overlay");
        const gameContainer = document.getElementById("game-container");
        const statusTitle = document.getElementById("status-title");

        const gridSize = 30;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {x: 10, y: 10};
        let dx = 1, dy = 0;
        let score = 0;
        let isRunning = false;
        let mode = 'manual';
        
        let lastMoveTime = 0;
        const moveInterval = 500; // 0.5 秒一格
        let foodHue = 0; 
        let fragments = []; 

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                if (!isRunning) startGame();
                else if (mode === 'bot') changeMode('manual');
                return;
            }
            const vk = document.getElementById("vkey-" + e.key);
            if (vk) {
                vk.classList.add("active-press");
                setTimeout(() => vk.classList.remove("active-press"), 100);
            }
            if (!isRunning || mode === 'bot') return;
            if (e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
            else if (e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
            else if (e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
            else if (e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        });

        function changeMode(m) {
            mode = m;
            document.getElementById("btn-manual").classList.toggle("active", mode === 'manual');
            document.getElementById("btn-bot").classList.toggle("active", mode === 'bot');
        }

        function startGame() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            dx = 1; dy = 0;
            score = 0;
            scoreVal.innerText = score;
            overlay.style.display = "none";
            document.getElementById("final-score").style.display = "none";
            isRunning = true;
            fragments = [];
            createFood();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(timestamp) {
            if (!isRunning && fragments.length === 0) return;

            if (isRunning && timestamp - lastMoveTime > moveInterval) {
                updateLogic();
                lastMoveTime = timestamp;
            }

            render(timestamp);
            requestAnimationFrame(gameLoop);
        }

        function updateLogic() {
            if (mode === 'bot') runAI();
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || 
                snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreVal.innerText = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function render(timestamp) {
            ctx.fillStyle = "#FFFDE7";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景
            ctx.strokeStyle = "rgba(0, 100, 0, 0.05)";
            for(let i=0; i<=canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            if (isRunning) {
                // 餌食霓虹效果
                foodHue = (foodHue + 3) % 360; 
                ctx.fillStyle = `hsl(${foodHue}, 80%, 50%)`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${foodHue}, 80%, 50%)`;
                ctx.beginPath();
                ctx.arc(food.x * gridSize + 15, food.y * gridSize + 15, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 蛇身繪製
                snake.forEach((part, index) => {
                    ctx.fillStyle = `hsl(${(index * 15) % 360}, 70%, 45%)`;
                    ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
                });
            }

            // 碎片動畫
            if (fragments.length > 0) {
                fragments.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3; 
                    p.life -= 0.02;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });
                fragments = fragments.filter(p => p.life > 0);
                ctx.globalAlpha = 1.0;
            }
        }

        function gameOver() {
            isRunning = false;
            gameContainer.classList.remove("shake");
            void gameContainer.offsetWidth; 
            gameContainer.classList.add("shake");

            snake.forEach((part, i) => {
                const color = `hsl(${(i * 15) % 360}, 70%, 45%)`;
                for(let j=0; j<6; j++) {
                    fragments.push({
                        x: part.x * gridSize + 15, y: part.y * gridSize + 15,
                        vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15,
                        size: Math.random() * 8 + 4, color: color, life: 1.0
                    });
                }
            });

            statusTitle.innerText = "遊戲結束";
            statusTitle.style.color = "#8B0000";
            document.getElementById("final-score").innerText = "最終得分: " + score;
            document.getElementById("final-score").style.display = "block";
            overlay.style.display = "flex";
        }

        function createFood() {
            food = { x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount) };
            if (snake.some(s => s.x === food.x && s.y === food.y)) createFood();
        }

        function runAI() {
            const head = snake[0];
            let nDx = dx, nDy = dy;
            if (head.x < food.x && dx !== -1) { nDx = 1; nDy = 0; }
            else if (head.x > food.x && dx !== 1) { nDx = -1; nDy = 0; }
            else if (head.y < food.y && dy !== -1) { nDx = 0; nDy = 1; }
            else if (head.y > food.y && dy !== 1) { nDx = 0; nDy = -1; }
            const check = (nx, ny) => nx < 0 || nx >= tileCount || ny < 0 || ny >= tileCount || snake.some(s => s.x === nx && s.y === ny);
            if (check(head.x + nDx, head.y + nDy)) {
                const moves = [[0,1],[0,-1],[1,0],[-1,0]];
                for(let m of moves) { if(!check(head.x+m[0], head.y+m[1])) { nDx=m[0]; nDy=m[1]; break; } }
            }
            dx = nDx; dy = nDy;
        }

        changeMode('manual');
        render(); 
    </script>
</body>
</html>
